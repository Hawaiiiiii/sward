name: validate
on:
  workflow_call:
    secrets:
      ASSET_REPO:
        required: false
      ASSET_REPO_TOKEN:
        required: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validation Preflight
    runs-on: ubuntu-24.04
    outputs:
      has_private_assets: ${{ steps.flags.outputs.has_private_assets }}

    steps:
      - id: flags
        shell: bash
        run: |
          if [[ -n "${{ secrets.ASSET_REPO }}" && -n "${{ secrets.ASSET_REPO_TOKEN }}" ]]; then
            echo "has_private_assets=true" >> "$GITHUB_OUTPUT"
            echo "Private asset secrets detected. Full build validation is enabled."
          else
            echo "has_private_assets=false" >> "$GITHUB_OUTPUT"
            echo "Private asset secrets are not configured. Running publishable-scope validation only."
          fi

  validate-publishable-scope:
    name: Validate Publishable Scope
    runs-on: ubuntu-24.04
    needs: preflight
    if: needs.preflight.outputs.has_private_assets != 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate Repository Identity
        run: |
          grep -q "Project Sonic World Adventure R&D" README.md
          grep -q "Project Sonic World Adventure R&D" REPO_PUBLISHING_SCOPE.md

      - name: Validate Publish Boundary
        run: |
          grep -q '^/extracted_assets/' .gitignore
          grep -q '^/UnleashedRecompLib/private/' .gitignore
          grep -q '^/UnleashedRecompLib/ppc/' .gitignore
          grep -q '^/research_uiux/data/' .gitignore

      - name: Validate Research Tooling
        run: |
          test -f research_uiux/tools/scan_ui_code.py
          test -f research_uiux/tools/scan_assets.py
          test -f research_uiux/tools/map_patch_hooks.py
          test -f research_uiux/tools/extract_state_keywords.py
          test -f research_uiux/tools/inspect_xncp_yncp.py

      - name: Validate CMake Presets
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("CMakePresets.json").read_text(encoding="utf-8"))
          presets = {preset["name"] for preset in data.get("configurePresets", [])}
          required = {
              "linux-debug",
              "linux-relwithdebinfo",
              "linux-release",
              "x64-Clang-Debug",
              "x64-Clang-RelWithDebInfo",
              "x64-Clang-Release",
          }
          missing = sorted(required - presets)
          if missing:
              raise SystemExit(f"Missing presets: {missing}")
          print("CMake preset validation passed.")
          PY

  build-linux:
    name: Build Linux
    needs: preflight
    if: needs.preflight.outputs.has_private_assets == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: ["linux-debug", "linux-release", "linux-relwithdebinfo"]
    env:
      LLVM_VERSION: 18
      CMAKE_PRESET: ${{ matrix.preset }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: ./private

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ matrix.preset }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
              vcpkg-${{ runner.os }}-

      - name: Install Dependencies (Linux)
        run: |-
          sudo apt update
          sudo apt install -y ninja-build llvm-${{ env.LLVM_VERSION }}-dev libgtk-3-dev

      - name: Cache ccache Directory
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-${{ runner.os }}-${{ matrix.preset }}

      - name: Prepare Project
        run: cp ./private/* ./UnleashedRecompLib/private

      - name: Configure Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: cmake . --preset ${{ env.CMAKE_PRESET }} -DSDL2MIXER_VORBIS=VORBISFILE -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: cmake --build ./out/build/${{ env.CMAKE_PRESET }} --target UnleashedRecomp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Linux-${{ env.CMAKE_PRESET }}
          path: ./out/build/${{ env.CMAKE_PRESET }}/UnleashedRecomp/UnleashedRecomp

  build-windows:
    name: Build Windows
    needs: preflight
    if: needs.preflight.outputs.has_private_assets == 'true'
    runs-on: windows-latest
    strategy:
      matrix:
        preset: ["x64-Clang-Debug", "x64-Clang-Release", "x64-Clang-RelWithDebInfo"]
    env:
      CMAKE_PRESET: ${{ matrix.preset }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: .\private

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ matrix.preset }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ./thirdparty/vcpkg/downloads
            ./thirdparty/vcpkg/packages
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
              vcpkg-${{ runner.os }}-

      - name: Install dependencies
        run: |
          choco install ninja
          Remove-Item -Path "C:\ProgramData\Chocolatey\bin\ccache.exe" -Force -ErrorAction SilentlyContinue

      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prepare Project
        run: |
          $commitMessage = git log -1 --pretty=%s
          Add-Content -Path $env:GITHUB_ENV -Value "commit_message=$commitMessage"
          copy .\private\* .\UnleashedRecompLib\private

      - name: Configure Project
        run: cmake . --preset ${{ env.CMAKE_PRESET }} -DSDL2MIXER_VORBIS=VORBISFILE -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Project
        run: cmake --build .\out\build\${{ env.CMAKE_PRESET }} --target UnleashedRecomp

      - name: Pack Release
        run: |
          New-Item -ItemType Directory -Path .\release
          New-Item -ItemType Directory -Path .\release\D3D12

          Move-Item -Path ".\out\build\${{ env.CMAKE_PRESET }}\UnleashedRecomp\D3D12\D3D12Core.dll" -Destination ".\release\D3D12\D3D12Core.dll"
          Move-Item -Path ".\out\build\${{ env.CMAKE_PRESET }}\UnleashedRecomp\dxcompiler.dll" -Destination ".\release\dxcompiler.dll"
          Move-Item -Path ".\out\build\${{ env.CMAKE_PRESET }}\UnleashedRecomp\dxil.dll" -Destination ".\release\dxil.dll"
          Move-Item -Path ".\out\build\${{ env.CMAKE_PRESET }}\UnleashedRecomp\UnleashedRecomp.exe" -Destination ".\release\UnleashedRecomp.exe"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Windows-${{ env.CMAKE_PRESET }}
          path: .\release

      - name: Upload PDB
        uses: actions/upload-artifact@v4
        if: ${{ matrix.preset != 'x64-Clang-Release' }}
        with:
          name: UnleashedRecomp-Windows-${{ env.CMAKE_PRESET }}-PDB
          path: .\out\build\${{ env.CMAKE_PRESET }}\UnleashedRecomp\UnleashedRecomp.pdb

  build-flatpak:
    name: Build Flatpak
    needs: preflight
    if: needs.preflight.outputs.has_private_assets == 'true'
    runs-on: ubuntu-24.04
    env:
      FLATPAK_ID: io.github.hedge_dev.unleashedrecomp
      FREEDESKTOP_VERSION: 23.08
      LLVM_VERSION: 18

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ASSET_REPO }}
          token: ${{ secrets.ASSET_REPO_TOKEN }}
          path: ./private

      - name: Install Dependencies
        run: |-
          sudo apt update
          sudo apt install -y flatpak-builder ccache

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-${{ runner.os }}

      - name: Prepare Project
        run: cp ./private/* ./UnleashedRecompLib/private

      - name: Prepare Flatpak
        run: |
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.freedesktop.Sdk//${{ env.FREEDESKTOP_VERSION }}
          flatpak --user install -y flathub org.freedesktop.Sdk.Extension.llvm${{ env.LLVM_VERSION }}//${{ env.FREEDESKTOP_VERSION }}

      - name: Build Flatpak
        run: |
          echo "commit_message=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
          export CCACHE_DIR=/tmp/ccache
          flatpak-builder --user --force-clean --install-deps-from=flathub --repo=repo --ccache builddir ./flatpak/${{ env.FLATPAK_ID }}.json
          flatpak build-bundle repo ./${{ env.FLATPAK_ID }}.flatpak ${{ env.FLATPAK_ID }} --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnleashedRecomp-Flatpak
          path: ./${{ env.FLATPAK_ID }}.flatpak
